server {
    listen 80;
    server_name _;

    root /not_exists;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # 带 hash 的静态资源（JS/CSS/图片等），长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
         proxy_pass ${BACKEND_URL};
         proxy_set_header Host $host;
    }

    location ^~ /${ADMIN_PREFIX}/api/ {
         proxy_pass ${BACKEND_URL};
         proxy_set_header Host $host;
    }

    location ^~ /${ADMIN_PREFIX}/ {
        alias /usr/share/nginx/html/;
    }
}
